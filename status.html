<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Next Drink</title>
    <style>
        * { box-sizing: border-box; }
        body, html {
            height: 100%; width: 100%; margin: 0; padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden; border-radius: 12px;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white; user-select: none;
        }
        .window-border { position: absolute; top: 0; left: 0; right: 0; bottom: 0; border: 1px solid rgba(255,255,255,0.2); border-radius: 12px; pointer-events: none; z-index: 10000; }
        header { position: absolute; top: 0; left: 0; right: 0; height: 35px; display: flex; align-items: center; justify-content: space-between; z-index: 9000; background: rgba(0,0,0,0.2); }
        .drag-handle { flex-grow: 1; height: 100%; -webkit-app-region: drag; }
        .window-controls { display: flex; height: 100%; }
        .win-btn { width: 40px; height: 100%; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 16px; color: rgba(255,255,255,0.5); -webkit-app-region: no-drag; }
        .win-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }
        .win-btn.close:hover { background: #e81123; border-top-right-radius: 12px; }
        main { margin-top: 35px; height: calc(100% - 35px); padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        h1 { margin: 0 0 5px 0; color: #00bcd4; font-size: 28px; text-shadow: 1px 1px 3px rgba(0,0,0,0.3); }
        .timer-box { flex-grow: 1; width: 100%; display: flex; justify-content: center; align-items: center; background: rgba(0, 0, 0, 0.3); border-radius: 12px; margin-bottom: 10px; box-shadow: inset 0 0 20px rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.05); }
        #time-left { font-weight: bold; color: #00bcd4; font-size: 82px; text-shadow: 0 0 20px rgba(0, 188, 212, 0.4); font-family: 'Courier New', Courier, monospace; }
        .settings-trigger { position: absolute; top: 10px; right: 10px; cursor: pointer; font-size: 20px; opacity: 0.5; transition: all 0.3s; }
        .settings-trigger:hover { opacity: 1; transform: rotate(90deg); color: #00bcd4; }
    </style>
</head>
<body>
    <div class="window-border"></div>
    <header>
        <div class="drag-handle"></div>
        <div class="window-controls">
            <div id="min-btn" class="win-btn">&minus;</div>
            <div id="close-btn" class="win-btn close">&times;</div>
        </div>
    </header>
    <main>
        <div id="settings-btn" class="settings-trigger">&#9881;</div>
        <h1>Next Drink</h1>
        <div style="font-size: 11px; color: #ccc; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px;">Countdown active</div>
        <div class="timer-box">
            <span id="time-left">--:--</span>
        </div>
        <div style="height: 20px;"></div>
    </main>
    <script>
        const { ipcRenderer } = require('electron');
        document.getElementById('close-btn').onclick = () => ipcRenderer.send('close-window');
        document.getElementById('min-btn').onclick = () => ipcRenderer.send('minimize-window');
        document.getElementById('settings-btn').onclick = () => ipcRenderer.send('open-options');

        function updateTimer() {
            const timeLeftMs = ipcRenderer.sendSync('get-time-left');
            const el = document.getElementById('time-left');
            if (timeLeftMs <= 0) { el.innerText = "00:00"; return; }
            const mins = Math.floor(timeLeftMs / 60000);
            const secs = Math.floor((timeLeftMs % 60000) / 1000);
            el.innerText = `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
        }
        setInterval(updateTimer, 1000); updateTimer();
    </script>
</body>
</html>
